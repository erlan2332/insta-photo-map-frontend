proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:32m max_size=512m inactive=30d use_temp_path=off;

map $arg_variant $media_cache_bypass {
    default 0;
    "" 1;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 300m;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    location /api/media/ {
        proxy_pass http://backend:8080/api/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_cache media_cache;
        proxy_cache_key $scheme$proxy_host$request_uri;
        proxy_cache_bypass $media_cache_bypass;
        proxy_no_cache $media_cache_bypass;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        add_header X-Media-Cache $upstream_cache_status always;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /favicon-camera.png {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
