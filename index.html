<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-camera.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insta Photo Map</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(242, 227, 198, 0.9), transparent 45%),
          linear-gradient(160deg, #f5efe4 0%, #dce6ec 46%, #f3eee6 100%);
        color: #123245;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(360px, 100%);
        padding: 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 60px rgba(18, 50, 69, 0.14);
        backdrop-filter: blur(18px);
      }

      .boot-card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .boot-card span {
        display: block;
        color: rgba(18, 50, 69, 0.72);
        font-size: 0.92rem;
      }

      .boot-progress {
        height: 8px;
        margin-top: 18px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(18, 50, 69, 0.1);
      }

      .boot-progress::after {
        content: "";
        display: block;
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #1c7cab, #4aa9d6);
        animation: boot-slide 1.4s ease-in-out infinite;
      }

      @keyframes boot-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(340%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-card">
          <strong>Открываем карту</strong>
          <span>Загружаем места и фотографии.</span>
          <div class="boot-progress"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
